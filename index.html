    <h2>Upload Road Image</h2>

    <input
        type="file"
        id="imageUpload"
        accept="image/*">

    <br><br>

    <img id="preview">

    <div id="result"></div>

    <!-- TensorFlow -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>

    <!-- Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script>

        const MODEL_URL = "./my_model/";

        let model;

        async function loadModel() {

            try {

                model = await tmImage.load(
                    MODEL_URL + "model.json",
                    MODEL_URL + "metadata.json"
                );

                console.log("Model Loaded Successfully");

            } catch (error) {

                console.error("Error loading model:", error);
                alert("Model could not be loaded.");
            }
        }

        loadModel();

        document
            .getElementById("imageUpload")
            .addEventListener("change", async function(event) {

            const file = event.target.files[0];

            if (!file) return;

            const img = document.getElementById("preview");

            img.src = window.URL.createObjectURL(file);
            img.style.display = "block";

            img.onload = async function() {

                if (!model) {
                    alert("Model is still loading. Please wait.");
                    return;
                }

                const prediction = await model.predict(img);

                let highestPrediction = prediction[0];

                for (let i = 1; i < prediction.length; i++) {

                    if (
                        prediction[i].probability >
                        highestPrediction.probability
                    ) {
                        highestPrediction = prediction[i];
                    }
                }

                document.getElementById("result").style.display = "block";

                document.getElementById("result").innerHTML = `

                    <h2>
                        Road Condition:
                        ${highestPrediction.className}
                    </h2>

                    <p>
                        <b>Confidence:</b>
                        ${(highestPrediction.probability * 100).toFixed(2)}%
                    </p>

                    <h3>Road Details</h3>

                    <p><b>Road Type:</b>
                    <select id="roadType">

                    <option>National Highway (NH)</option>

                    <option>State Highway (SH)</option>

                    <option>City Road</option>

                    <option>Village Road</option>

                    </select></p>

                    <p><b>Contractor Name:</b>
                    ABC Infra Pvt Ltd</p>

                    <p><b>Last Relaying Year:</b>
                    2023</p>

                    <p><b>Executive Engineer:</b>
                    Ramesh Kumar</p>

                    <p><b>Department:</b>
                    National Highways Division</p>

                    <hr>

                    <h3>Raise Complaint</h3>

                    <textarea
                        id="complaint"
                        rows="5"
                        placeholder="Enter your complaint here...">
                    </textarea>
                    <button onclick="startVoice()">
                    🎤 Record Complaint
                    </button>
                    <p id="voiceStatus"></p>

                    <br>

                    <button onclick="submitComplaint()">
                        Report Complaint
                    </button>

                    <p id="status"></p>
                `;
            };
        });
        function startVoice(){

    const recognition =
        new webkitSpeechRecognition();

    recognition.lang = "en-IN";

    recognition.start();

    document.getElementById("voiceStatus").innerHTML =
        "🎤 Listening... Speak now";

    recognition.onresult = function(event){

        const transcript =
            event.results[0][0].transcript;

        document.getElementById("complaint").value =
            transcript;

        document.getElementById("voiceStatus").innerHTML =
            "✅ Voice recorded successfully";

    };

    recognition.onerror = function(){

        document.getElementById("voiceStatus").innerHTML =
            "❌ Voice recording failed";

    };

}

        function submitComplaint() {

            const complaintText =
                document.getElementById("complaint").value;

            if (complaintText.trim() === "") {

                document.getElementById("status").innerHTML =
                    "Road condition reported successfully!";

            } else {

                document.getElementById("status").innerHTML =
                    "Complaint reported successfully!";
            }
        }

<script>

const map = L.map('map').setView([16.5062, 80.6480], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

let marker;

if (navigator.geolocation) {

    navigator.geolocation.getCurrentPosition(

        function(position) {

            let lat = position.coords.latitude;
            let lon = position.coords.longitude;

            map.setView([lat, lon], 15);

            marker = L.marker([lat, lon])
                .addTo(map)
                .bindPopup("You are here")
                .openPopup();

            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)

            .then(response => response.json())

            .then(data => {

                let city =
                    data.address.city ||
                    data.address.town ||
                    data.address.village ||
                    "Unknown";

                let state =
                    data.address.state || "";

                document.getElementById("locationText").innerHTML =
                    "Current Location: " + city + ", " + state;

            });

        },

        function(error) {

            document.getElementById("locationText").innerHTML =
                "Location permission denied.";

            console.log(error);

        },

        {
            enableHighAccuracy: true
        }

    );

}
else {

    document.getElementById("locationText").innerHTML =
        "Geolocation not supported.";

}

</script>
